<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Face Recognition</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">📸</div>
            <h2>Register Your Face</h2>
            <p class="subtitle">Create your facial recognition profile</p>
            
            <form id="registerForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                
                <!-- Webcam Auto-Capture Section -->
                <div id="webcamSection" style="display: none; margin-bottom: 20px;">
                    <video id="webcamVideo" autoplay playsinline style="width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 10px;"></video>
                    <div id="angleInstruction" style="text-align: center; margin-bottom: 10px; font-weight: 700; color: #667eea; font-size: 1.1em;">
                        📍 Ready to capture
                    </div>
                    <div id="captureStatus" style="text-align: center; margin-bottom: 15px; font-weight: 600; color: #888;">
                        Press Start to begin capturing from 5 angles
                    </div>
                    <button type="button" id="startCaptureBtn" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">🎬 Start Capturing (5 angles)</button>
                    <button type="button" id="cancelCaptureBtn" class="btn btn-secondary" style="width: 100%; display: none;">❌ Cancel</button>
                    <canvas id="canvas" style="display: none;"></canvas>
                </div>
                
                <!-- Webcam Auto-Capture Instructions -->
                <div style="margin-bottom: 20px;">
                    <small style="color: #888; display: block; margin-bottom: 10px;">📌 Position your face clearly in the webcam for best results</small>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">✅ Register</button>
            </form>
            
            <p id="message"></p>
            <a href="/" class="btn btn-back">← Back to Home</a>
        </div>
    </div>
    
    <script>
        let webcamStream = null;
        let capturedFrames = [];
        let isCapturing = false;
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('canvas');
        const startCaptureBtn = document.getElementById('startCaptureBtn');
        const cancelCaptureBtn = document.getElementById('cancelCaptureBtn');
        const captureStatus = document.getElementById('captureStatus');
        const angleInstruction = document.getElementById('angleInstruction');
        const webcamSection = document.getElementById('webcamSection');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const form = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');
        const FRAMES_TO_CAPTURE = 5;
        const COUNTDOWN_SECONDS = 3;
        const ANGLES = [
            { name: '⬆️ Face Forward', prompt: 'Look straight at the camera' },
            { name: '↙️ Turn Slightly Left', prompt: 'Turn your face slightly to the left' },
            { name: '⬅️ Turn Left', prompt: 'Turn your face more to the left side' },
            { name: '↗️ Turn Slightly Right', prompt: 'Turn your face slightly to the right' },
            { name: '➡️ Turn Right', prompt: 'Turn your face more to the right side' }
        ];

        function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function captureSingleFrame(ctx) {
            return new Promise((resolve) => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.95);
            });
        }

        // Initialize webcam on page load
        (async () => {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = webcamStream;
                webcamSection.style.display = 'block';
            } catch (err) {
                messageEl.textContent = '❌ Camera access denied: ' + err.message;
                messageEl.className = 'error';
            }
        })();

        // Start auto-capturing frames
        startCaptureBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isCapturing) return;
            capturedFrames = [];
            isCapturing = true;
            startCaptureBtn.style.display = 'none';
            cancelCaptureBtn.style.display = 'inline-block';
            messageEl.textContent = '';
            captureMultipleFrames();
        });

        // Cancel capturing
        cancelCaptureBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isCapturing = false;
            capturedFrames = [];
            startCaptureBtn.style.display = 'inline-block';
            cancelCaptureBtn.style.display = 'none';
            angleInstruction.textContent = '📍 Ready to capture';
            captureStatus.textContent = 'Press Start to begin capturing from 5 angles';
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            messageEl.className = '';
        });

        // Capture frames from different angles with voice guidance and countdown.
        async function captureMultipleFrames() {
            const ctx = canvas.getContext('2d');
            
            for (let frameCount = 0; frameCount < FRAMES_TO_CAPTURE; frameCount++) {
                if (!isCapturing) {
                    return;
                }

                const currentAngle = ANGLES[frameCount];
                angleInstruction.textContent = currentAngle.name;
                captureStatus.textContent = 'Prepare for photo ' + (frameCount + 1) + '/' + FRAMES_TO_CAPTURE;
                speak(currentAngle.prompt);

                await sleep(800);

                for (let countdown = COUNTDOWN_SECONDS; countdown >= 1; countdown--) {
                    if (!isCapturing) {
                        return;
                    }
                    captureStatus.textContent = 'Capturing photo ' + (frameCount + 1) + '/' + FRAMES_TO_CAPTURE + ' in ' + countdown;
                    speak(String(countdown));
                    await sleep(1000);
                }

                if (!isCapturing) {
                    return;
                }

                const blob = await captureSingleFrame(ctx);
                if (blob) {
                    capturedFrames.push(blob);
                    speak('Captured');
                }

                if (frameCount < FRAMES_TO_CAPTURE - 1) {
                    const nextAngle = ANGLES[frameCount + 1];
                    captureStatus.textContent = 'Captured ' + (frameCount + 1) + '/' + FRAMES_TO_CAPTURE + '. Next: ' + nextAngle.name;
                    await sleep(700);
                }
            }

            isCapturing = false;
            startCaptureBtn.style.display = 'inline-block';
            cancelCaptureBtn.style.display = 'none';
            angleInstruction.textContent = '✅ All angles captured!';
            captureStatus.textContent = capturedFrames.length + ' face angles ready for registration';
            messageEl.textContent = '✅ ' + capturedFrames.length + ' multi-angle face samples ready!';
            messageEl.className = 'success';
            speak('All photos captured. You can now register.');
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageEl.textContent = '⏳ Processing...';
            messageEl.className = '';

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            if (!name) {
                messageEl.textContent = '❌ Please enter your name';
                messageEl.className = 'error';
                return;
            }

            if (!email) {
                messageEl.textContent = '❌ Please enter your email';
                messageEl.className = 'error';
                return;
            }

            // Check if we have webcam frames
            if (capturedFrames.length === 0) {
                messageEl.textContent = '❌ Please capture 5 frames using the webcam';
                messageEl.className = 'error';
                return;
            }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            capturedFrames.forEach((blob, idx) => {
                formData.append('images', blob, `frame_${idx}.jpg`);
            });

            try {
                const res = await fetch('/register', {method: 'POST', body: formData});
                const data = await res.json();

                if (data.success) {
                    messageEl.textContent = '✅ ' + data.message;
                    messageEl.className = 'success';
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    messageEl.textContent = '❌ ' + (data.message || 'Registration failed');
                    messageEl.className = 'error';
                }
            } catch (err) {
                messageEl.textContent = '❌ Error: ' + err.message;
                messageEl.className = 'error';
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Face Recognition</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">📸</div>
            <h2>Register Your Face</h2>
            <p class="subtitle">Create your facial recognition profile</p>
            
            <form id="registerForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                
                <!-- Webcam Auto-Capture Section -->
                <div id="webcamSection" style="display: none; margin-bottom: 20px;">
                    <video id="webcamVideo" autoplay playsinline style="width: 100%; max-width: 350px; border-radius: 15px; margin-bottom: 10px;"></video>
                    <div id="captureStatus" style="text-align: center; margin-bottom: 15px; font-weight: 600; color: #667eea;">
                        📸 Ready to capture
                    </div>
                    <button type="button" id="startCaptureBtn" class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">🎬 Start Capturing (5 frames)</button>
                    <button type="button" id="cancelCaptureBtn" class="btn btn-secondary" style="width: 100%; display: none;">❌ Cancel</button>
                    <canvas id="canvas" style="display: none;"></canvas>
                </div>
                
                <!-- File Upload Section -->
                <div id="fileSection" style="margin-bottom: 20px;">
                    <div style="margin-bottom: 20px;">
                        <button type="button" id="toggleWebcam" class="btn btn-secondary" style="width: 100%;">📷 Use Webcam (Auto-Capture)</button>
                    </div>
                </div>
                
                <!-- Alternative File Upload -->
                <div id="fileUploadSection">
                    <div class="form-group">
                        <label for="image">🖼️ Or Upload Photo</label>
                        <input type="file" id="image" name="image" accept="image/*">
                        <small style="color: #888; display: block; margin-top: 5px;">📌 Clear, well-lit photos work best</small>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">✅ Register</button>
            </form>
            
            <p id="message"></p>
            <a href="/" class="btn btn-back">← Back to Home</a>
        </div>
    </div>
    
    <script>
        let webcamStream = null;
        let capturedFrames = [];
        let isCapturing = false;
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('canvas');
        const toggleBtn = document.getElementById('toggleWebcam');
        const startCaptureBtn = document.getElementById('startCaptureBtn');
        const cancelCaptureBtn = document.getElementById('cancelCaptureBtn');
        const captureStatus = document.getElementById('captureStatus');
        const webcamSection = document.getElementById('webcamSection');
        const fileSection = document.getElementById('fileSection');
        const fileUploadSection = document.getElementById('fileUploadSection');
        const fileInput = document.getElementById('image');
        const nameInput = document.getElementById('name');
        const form = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');
        const FRAMES_TO_CAPTURE = 5;
        const FRAME_INTERVAL = 800;

        // Toggle between webcam and file upload
        toggleBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            if (webcamSection.style.display === 'none') {
                // Enable webcam
                try {
                    webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = webcamStream;
                    webcamSection.style.display = 'block';
                    fileUploadSection.style.display = 'none';
                    toggleBtn.textContent = '🖼️ Use Photo Instead';
                    fileInput.removeAttribute('required');
                } catch (err) {
                    messageEl.textContent = '❌ Camera access denied: ' + err.message;
                    messageEl.className = 'error';
                }
            } else {
                // Switch back to file upload
                if (webcamStream) {
                    webcamStream.getTracks().forEach(track => track.stop());
                }
                webcamSection.style.display = 'none';
                fileUploadSection.style.display = 'block';
                toggleBtn.textContent = '📷 Use Webcam (Auto-Capture)';
                fileInput.setAttribute('required', 'required');
                capturedFrames = [];
            }
        });

        // Start auto-capturing frames
        startCaptureBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isCapturing) return;
            capturedFrames = [];
            isCapturing = true;
            startCaptureBtn.style.display = 'none';
            cancelCaptureBtn.style.display = 'inline-block';
            captureMultipleFrames();
        });

        // Cancel capturing
        cancelCaptureBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isCapturing = false;
            capturedFrames = [];
            startCaptureBtn.style.display = 'inline-block';
            cancelCaptureBtn.style.display = 'none';
            captureStatus.textContent = '📸 Ready to capture';
            messageEl.className = '';
        });

        // Capture frames at intervals
        function captureMultipleFrames() {
            const ctx = canvas.getContext('2d');
            let frameCount = 0;

            const intervalId = setInterval(() => {
                if (!isCapturing || frameCount >= FRAMES_TO_CAPTURE) {
                    clearInterval(intervalId);
                    if (frameCount === FRAMES_TO_CAPTURE) {
                        isCapturing = false;
                        startCaptureBtn.style.display = 'inline-block';
                        cancelCaptureBtn.style.display = 'none';
                        captureStatus.textContent = `✅ Captured ${frameCount} frames!`;
                        messageEl.textContent = `✅ ${frameCount} face samples ready for registration`;
                        messageEl.className = 'success';
                    }
                    return;
                }

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                canvas.toBlob((blob) => {
                    capturedFrames.push(blob);
                    frameCount++;
                    const remaining = FRAMES_TO_CAPTURE - frameCount;
                    captureStatus.textContent = `📸 Captured ${frameCount}/${FRAMES_TO_CAPTURE} (${remaining} more)`;
                }, 'image/jpeg', 0.95);
            }, FRAME_INTERVAL);
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageEl.textContent = '⏳ Processing...';
            messageEl.className = '';

            const name = nameInput.value.trim();
            if (!name) {
                messageEl.textContent = '❌ Please enter your name';
                messageEl.className = 'error';
                return;
            }

            // Check if we have webcam frames or file upload
            if (capturedFrames.length === 0 && fileInput.files.length === 0) {
                messageEl.textContent = '❌ Please capture at least one frame or upload an image';
                messageEl.className = 'error';
                return;
            }

            const formData = new FormData();
            formData.append('name', name);

            if (capturedFrames.length > 0) {
                capturedFrames.forEach((blob, idx) => {
                    formData.append('images', blob, `frame_${idx}.jpg`);
                });
            } else {
                formData.append('image', fileInput.files[0]);
            }

            try {
                const res = await fetch('/register', {method: 'POST', body: formData});
                const data = await res.json();

                if (data.success) {
                    messageEl.textContent = '✅ ' + data.message;
                    messageEl.className = 'success';
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    messageEl.textContent = '❌ ' + (data.message || 'Registration failed');
                    messageEl.className = 'error';
                }
            } catch (err) {
                messageEl.textContent = '❌ Error: ' + err.message;
                messageEl.className = 'error';
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Face Recognition</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">📸</div>
            <h2>Register Your Face</h2>
            <p class="subtitle">Create your facial recognition profile</p>
            
            <form id="registerForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="image">🖼️ Upload Face Photo</label>
                    <input type="file" id="image" name="image" accept="image/*" required>
                    <small style="color: #888; display: block; margin-top: 5px;">📌 Clear, well-lit photos work best</small>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">✅ Register</button>
            </form>
            
            <p id="message"></p>
            <a href="/" class="btn btn-back">← Back to Home</a>
        </div>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            messageEl.textContent = '⏳ Processing...';
            messageEl.className = '';
            
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/register', {method: 'POST', body: formData});
                const text = await res.text();
                
                if (text.includes('successfully')) {
                    messageEl.textContent = '✅ ' + text;
                    messageEl.className = 'success';
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    messageEl.textContent = '❌ ' + text;
                    messageEl.className = 'error';
                }
            } catch (err) {
                messageEl.textContent = '❌ Error: ' + err.message;
                messageEl.className = 'error';
            }
        });
    </script>
</body>
</html>
